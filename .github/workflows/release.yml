name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: tools platform-tools

      - name: Install Android platform packages
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Write local.properties
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_SDK_ROOT:-}" ]; then
            echo "ANDROID_SDK_ROOT is not set"
            exit 1
          fi
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build release assets
        run: |
          ./gradlew \
            :apk-ui-parse-android:assembleRelease \
            :apk-ui-parse-core:test \
            :apk-ui-parse-sample:assembleDebug

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"

          if ! gh release view "${TAG_NAME}" > /dev/null 2>&1; then
            gh release create "${TAG_NAME}" \
              --title "${TAG_NAME}" \
              --generate-notes
          fi

          gh release upload "${TAG_NAME}" \
            apk-ui-parse-android/build/outputs/aar/apk-ui-parse-android-release.aar \
            apk-ui-parse-sample/build/outputs/apk/debug/apk-ui-parse-sample-debug.apk \
            --clobber
