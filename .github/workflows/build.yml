name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Prepare Android SDK
        shell: bash
        run: |
          set -euo pipefail
          ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "${ANDROID_SDK_ROOT}" ]; then
            echo "ANDROID_SDK_ROOT is not set"
            exit 1
          fi

          SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "${SDKMANAGER}" ]; then
            SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/bin/sdkmanager"
          fi

          yes | "${SDKMANAGER}" --licenses > /dev/null || true
          "${SDKMANAGER}" \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build artifacts
        run: |
          ./gradlew \
            :apk-ui-parse-core:build \
            :apk-ui-parse-android:assembleRelease \
            :apk-ui-parse-android:exportReleaseJar \
            :apk-ui-parse-sample:assembleDebug

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: apk-ui-parse-build-artifacts
          if-no-files-found: error
          retention-days: 14
          path: |
            apk-ui-parse-core/build/libs/*.jar
            apk-ui-parse-android/build/libs/*.jar
            apk-ui-parse-android/build/outputs/aar/*.aar
            apk-ui-parse-sample/build/outputs/apk/debug/*.apk
